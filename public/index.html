<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatterAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ──────────────────────────────────────────── */
    :root {
      --primary:        #6e56cf;
      --primary-hover:  #7c67d4;
      --primary-muted:  rgba(110,86,207,0.1);
      --bg:             #f5f5ff;
      --sidebar-bg:     #f0f0fa;
      --fg:             #2a2a4a;
      --fg-2:           #6b6b8e;
      --fg-3:           #9898b5;
      --card:           #ffffff;
      --border:         #e0e0f0;
      --border-hi:      #c5c5e0;
      --green:          #22c55e;
      --red:            #ef4444;
      --blue:           #3b82f6;
      --font-sans:      'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-mono:      'JetBrains Mono', ui-monospace, monospace;
      --sidebar-w:      264px;
      --header-h:       56px;
      --r:              8px;
      --r-sm:           4px;
    }

    html.dark {
      --primary:        #a48fff;
      --primary-hover:  #b39fff;
      --primary-muted:  rgba(164,143,255,0.12);
      --bg:             #0f0f1a;
      --sidebar-bg:     #1a1a2e;
      --fg:             #e2e2f5;
      --fg-2:           #9898b5;
      --fg-3:           #5a5a7a;
      --card:           #1e1e32;
      --border:         #2a2a45;
      --border-hi:      #3a3a58;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      display: flex;
      overflow: hidden;
      height: 100dvh;
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width 0.22s ease, min-width 0.22s ease;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      width: 48px;
      min-width: 48px;
    }

    .sidebar-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }

    .sidebar-title {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fg-3);
      white-space: nowrap;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.15s;
    }

    .sidebar.collapsed .sidebar-title { opacity: 0; pointer-events: none; }

    .sidebar-toggle {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      cursor: pointer;
      color: var(--fg-2);
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s;
    }

    .sidebar-toggle:hover { background: var(--border); border-color: var(--border-hi); }
    .sidebar-toggle svg { transition: transform 0.22s; }
    .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar-empty {
      padding: 20px 12px;
      font-size: 12px;
      color: var(--fg-3);
      text-align: center;
    }

    .sidebar-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .sidebar-item:hover { background: var(--border); }

    .sidebar-item.active {
      background: var(--primary-muted);
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--primary);
      border-radius: 0 2px 2px 0;
    }

    .sidebar-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
      background: var(--fg-3);
    }

    .sidebar-content {
      flex: 1;
      min-width: 0;
      opacity: 1;
      transition: opacity 0.15s;
    }

    .sidebar.collapsed .sidebar-content { opacity: 0; pointer-events: none; }

    .sidebar-query {
      font-size: 12px;
      font-weight: 500;
      color: var(--fg);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .sidebar-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .sidebar-status {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-3);
    }

    .sidebar-time {
      font-size: 10px;
      color: var(--fg-3);
    }

    .sidebar-summary {
      font-size: 11px;
      color: var(--fg-2);
      margin-top: 3px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      overflow: hidden;
    }

    /* Status colours (dots + labels) */
    .dot-calling   { background: var(--primary) !important; animation: pulse-dot 1.3s ease-in-out infinite; }
    .dot-completed { background: var(--green) !important; }
    .dot-failed    { background: var(--red) !important; }
    .dot-scheduled { background: var(--blue) !important; }

    .lbl-calling   { color: var(--primary) !important; }
    .lbl-completed { color: var(--green) !important; }
    .lbl-failed    { color: var(--red) !important; }
    .lbl-scheduled { color: var(--blue) !important; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main ───────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wordmark {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--fg);
    }

    .wordmark .accent { color: var(--primary); }

    .header-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--primary-muted);
      border-radius: 100px;
      padding: 3px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--primary);
    }

    #health-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #health-dot.err     { background: var(--red); }
    #health-dot.calling { background: var(--primary); animation: pulse-dot 1.3s ease-in-out infinite; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-email {
      font-size: 12px;
      color: var(--fg-2);
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      cursor: pointer;
      color: var(--fg-2);
      font-size: 14px;
      transition: background 0.12s, border-color 0.12s;
    }

    .icon-btn:hover { background: var(--border); border-color: var(--border-hi); }

    .btn-signout {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--fg-2);
      padding: 5px 12px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }

    .btn-signout:hover { border-color: var(--border-hi); color: var(--fg); }

    /* ── Scroll area ─────────────────────────────────────────────── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 48px;
      width: 100%;
    }

    /* ── Hero ────────────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 56px 0 32px;
      transition: padding 0.2s;
    }

    .hero.compact { padding: 28px 0 20px; }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: 2rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .hero-title .accent { color: var(--primary); }

    .hero-subtitle {
      font-size: 15px;
      color: var(--fg-2);
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .hero.compact .hero-eyebrow,
    .hero.compact .hero-subtitle { display: none; }

    /* ── Agent selector ──────────────────────────────────────────── */
    .agent-section { margin-top: 28px; }

    .section-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-3);
      margin-bottom: 10px;
    }

    .agent-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .agent-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      cursor: pointer;
      color: var(--fg);
      position: relative;
      overflow: hidden;
      user-select: none;
      transition: border-color 0.15s, background 0.15s, transform 0.12s, box-shadow 0.15s;
    }

    .agent-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .agent-btn:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(110,86,207,0.18);
    }

    .agent-btn:hover::after { opacity: 0.06; }
    .agent-btn:active { transform: translateY(0); }

    .agent-btn.selected {
      border-color: var(--primary);
      background: var(--primary-muted);
    }

    .agent-btn.selected::after { opacity: 0.05; }

    .agent-icon {
      font-size: 16px;
      position: relative;
      z-index: 1;
      line-height: 1;
    }

    .agent-label {
      font-size: 13px;
      font-weight: 500;
      position: relative;
      z-index: 1;
      white-space: nowrap;
      color: var(--fg);
      transition: color 0.15s;
    }

    .agent-btn.selected .agent-label { color: var(--primary); }

    /* ── Input card ──────────────────────────────────────────────── */
    .input-section { margin-top: 20px; }

    .input-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-card:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(110,86,207,0.12);
    }

    html.dark .input-card:focus-within {
      box-shadow: 0 0 0 3px rgba(164,143,255,0.15);
    }

    textarea#main-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 80px;
      padding: 16px 20px 8px;
      field-sizing: content;
    }

    textarea#main-input::placeholder { color: var(--fg-3); }

    .input-footer {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      gap: 10px;
    }

    .input-hint {
      font-size: 11px;
      color: var(--fg-3);
      font-family: var(--font-mono);
      flex: 1;
    }

    #submit-error {
      font-size: 12px;
      color: var(--red);
      font-family: var(--font-mono);
    }

    .btn-submit {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      padding: 8px 20px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.12s, opacity 0.12s, transform 0.1s;
    }

    .btn-submit:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Chips ───────────────────────────────────────────────────── */
    .chips-section { margin-top: 14px; }

    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .example-chip {
      font-size: 12px;
      color: var(--fg-2);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }

    .example-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-muted);
    }

    /* ── Tasks section ───────────────────────────────────────────── */
    .tasks-section { margin-top: 32px; }

    .tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    /* ── Task card ───────────────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .task-card:hover { border-color: var(--border-hi); }

    .task-card.s-calling {
      border-color: rgba(110,86,207,0.4);
      box-shadow: 0 0 0 1px rgba(110,86,207,0.08);
    }

    html.dark .task-card.s-calling {
      border-color: rgba(164,143,255,0.35);
    }

    .task-card-header {
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
    }

    .task-status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 100px;
      background: var(--border);
      flex-shrink: 0;
    }

    .task-card.s-calling .task-status-pill { background: var(--primary-muted); }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--fg-3);
      flex-shrink: 0;
    }

    .status-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg-3);
    }

    .task-info-text { min-width: 0; }

    .task-request {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task-sub {
      font-size: 11px;
      color: var(--fg-2);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-chip {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--fg-2);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .agent-chip.food_ordering            { color: #f59e0b; border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.08); }
    .agent-chip.appointment_booking      { color: var(--blue); border-color: rgba(59,130,246,0.35); background: rgba(59,130,246,0.08); }
    .agent-chip.general_customer_service { color: var(--green); border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.08); }
    .agent-chip.insurance_calls          { color: #a855f7; border-color: rgba(168,85,247,0.35); background: rgba(168,85,247,0.08); }

    .task-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--fg-3);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .task-cancel {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--fg-3);
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: var(--r-sm);
      opacity: 0;
      transition: opacity 0.12s, color 0.12s;
      flex-shrink: 0;
    }

    .task-card:hover .task-cancel { opacity: 1; }
    .task-cancel:hover { color: var(--red); }

    /* Progress bar */
    .task-progress { height: 2px; background: var(--border); }

    .task-progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 2s linear;
    }

    .task-card.s-completed .task-progress-fill { background: var(--green); width: 100%; }
    .task-card.s-failed    .task-progress-fill { background: var(--red);   width: 100%; }

    /* Transcript expand */
    .transcript-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.22s ease;
    }

    .transcript-wrap.open { grid-template-rows: 1fr; }
    .transcript-inner { overflow: hidden; }

    .transcript-body {
      border-top: 1px solid var(--border);
      padding: 16px 20px 20px;
    }

    /* Chat bubbles */
    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow-y: auto;
      padding: 2px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-message {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-message.user { flex-direction: row-reverse; }

    .chat-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-family: var(--font-mono);
      font-weight: 500;
      flex-shrink: 0;
    }

    .chat-message.agent .chat-avatar { background: var(--primary-muted); color: var(--primary); }
    .chat-message.user  .chat-avatar { background: var(--border); color: var(--fg-2); }

    .chat-bubble {
      max-width: 76%;
      padding: 9px 14px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
      border-radius: 16px;
    }

    .chat-message.agent .chat-bubble {
      background: var(--primary-muted);
      color: var(--fg);
      border-bottom-left-radius: 4px;
    }

    .chat-message.user .chat-bubble {
      background: var(--border);
      color: var(--fg);
      border-bottom-right-radius: 4px;
    }

    .transcript-cursor {
      display: inline-block;
      color: var(--primary);
      animation: blink-cursor 0.9s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .transcript-empty-msg {
      font-size: 13px;
      color: var(--fg-3);
      text-align: center;
      padding: 20px 0;
    }

    .transcript-result {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      font-size: 12px;
      font-family: var(--font-mono);
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--green);
    }

    .transcript-result.failed {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.25);
      color: var(--red);
    }

    /* Mark complete */
    .mark-complete-wrap {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .mark-complete-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--fg-2);
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }

    .mark-complete-btn:hover { border-color: var(--primary); color: var(--primary); }

    .mark-complete-input-wrap {
      display: none;
      gap: 8px;
      margin-top: 8px;
    }

    .mark-complete-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      transition: border-color 0.12s;
    }

    .mark-complete-input:focus { border-color: var(--primary); }

    .mark-complete-confirm {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--r-sm);
      padding: 7px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }

    .mark-complete-confirm:hover { background: var(--primary-hover); }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .sidebar { display: none; }
      .agent-label { display: none; }
      .agent-btn { padding: 10px 12px; }
      .user-email { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .transcript-cursor, #health-dot.calling,
      .dot-calling, .status-dot { animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">History</span>
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 2L4 7l5 5"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <div class="sidebar-empty">No calls yet</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header>
      <div class="header-left">
        <span class="wordmark">CHATTER<span class="accent">AI</span></span>
        <div class="header-pill">
          <div id="health-dot"></div>
          <span id="health-label">0 active</span>
        </div>
      </div>
      <div class="header-right">
        <span class="user-email" id="user-email"></span>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">☀</button>
        <button class="btn-signout" onclick="signOut()">Sign Out</button>
      </div>
    </header>

    <div class="scroll-area">
      <div class="content">

        <!-- Hero -->
        <div class="hero" id="hero">
          <div class="hero-eyebrow">AI-Powered Phone Agent</div>
          <div class="hero-title">CHATTER<span class="accent">AI</span></div>
          <div class="hero-subtitle">Tell it what you need done. It makes the call.</div>
        </div>

        <!-- Agent selector -->
        <div class="agent-section">
          <div class="section-label">Agent</div>
          <div class="agent-grid" id="agent-grid">
            <button class="agent-btn selected" data-agent="auto">
              <span class="agent-icon">✨</span>
              <span class="agent-label">Auto-detect</span>
            </button>
            <button class="agent-btn" data-agent="food_ordering">
              <span class="agent-icon">🍔</span>
              <span class="agent-label">Food Ordering</span>
            </button>
            <button class="agent-btn" data-agent="appointment_booking">
              <span class="agent-icon">📅</span>
              <span class="agent-label">Appointments</span>
            </button>
            <button class="agent-btn" data-agent="general_customer_service">
              <span class="agent-icon">💬</span>
              <span class="agent-label">Customer Service</span>
            </button>
            <button class="agent-btn" data-agent="insurance_calls">
              <span class="agent-icon">🛡️</span>
              <span class="agent-label">Insurance</span>
            </button>
          </div>
        </div>

        <!-- Input -->
        <div class="input-section">
          <div class="input-card">
            <textarea
              id="main-input"
              placeholder='e.g. "Order a large taro boba for pickup at 5pm from the nearest boba shop in SF" or "Call +1-650-555-1234 and book a haircut for Saturday"'
            ></textarea>
            <div class="input-footer">
              <span class="input-hint">↵ send · Shift+↵ newline</span>
              <span id="submit-error"></span>
              <button class="btn-submit" id="submit-btn" type="button">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 6h8M6 2l4 4-4 4"/>
                </svg>
                Execute
              </button>
            </div>
          </div>
        </div>

        <!-- Example chips -->
        <div class="chips-section" id="chips-section">
          <div class="chips-wrap" id="chips-wrap"></div>
        </div>

        <!-- Tasks -->
        <div class="tasks-section" id="tasks-section" style="display:none">
          <div class="tasks-header">
            <div class="section-label" style="margin:0">Recent Calls</div>
            <div class="section-label" style="margin:0" id="calls-count"></div>
          </div>
          <div id="task-list"></div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ── Auth guard ──────────────────────────────────────────────────────────────
    // SUPABASE SWAP: replace sessionStorage check with:
    //   const { data: { session } } = await supabase.auth.getSession()
    //   if (!session) window.location.href = '/login.html'
    ;(function authGuard() {
      if (!sessionStorage.getItem('chatter_authed')) {
        window.location.href = '/login.html';
      }
      const email = sessionStorage.getItem('chatter_user_email') || '';
      if (email) document.getElementById('user-email').textContent = email;
    })();

    function signOut() {
      // SUPABASE SWAP: await supabase.auth.signOut()
      sessionStorage.clear();
      window.location.href = '/login.html';
    }

    // ── Theme ───────────────────────────────────────────────────────────────────
    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('chatter_theme') === 'dark') {
      document.documentElement.classList.add('dark');
      themeToggle.textContent = '☽';
    }
    themeToggle.addEventListener('click', () => {
      const dark = document.documentElement.classList.toggle('dark');
      themeToggle.textContent = dark ? '☽' : '☀';
      localStorage.setItem('chatter_theme', dark ? 'dark' : 'light');
    });

    // ── Sidebar toggle ──────────────────────────────────────────────────────────
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });

    // ── Agent selector ──────────────────────────────────────────────────────────
    let selectedAgent = 'auto';

    document.getElementById('agent-grid').addEventListener('click', e => {
      const btn = e.target.closest('.agent-btn');
      if (!btn) return;
      document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAgent = btn.dataset.agent;
    });

    // ── State ───────────────────────────────────────────────────────────────────
    const state = {
      tasks:     [],
      expanded:  new Set(),
      details:   {},
      callStart: {},
    };

    // ── Example chips ───────────────────────────────────────────────────────────
    const EXAMPLE_CHIPS = [
      { label: 'Order boba pickup',   template: 'Order a large taro boba for pickup at 5pm from the nearest boba shop in SF' },
      { label: 'Book a vet visit',    template: 'Find a vet near downtown Seattle and book an appointment for my dog next week' },
      { label: 'Schedule a haircut',  template: 'Call +1-XXX-XXX-XXXX and book a haircut for Saturday at noon' },
      { label: 'Dispute insurance',   template: 'Call +1-XXX-XXX-XXXX and ask about lowering my monthly insurance rate' },
      { label: 'Get medical records', template: 'Call +1-XXX-XXX-XXXX and request a copy of my medical records' },
      { label: 'Book a restaurant',   template: 'Find a good Italian restaurant in SoHo and make a reservation for 2 at 7pm tonight' },
    ];

    function renderChips() {
      const wrap = document.getElementById('chips-wrap');
      if (!wrap) return;
      wrap.innerHTML = EXAMPLE_CHIPS.map((c, i) =>
        `<button class="example-chip" data-idx="${i}">${escHtml(c.label)}</button>`
      ).join('');
      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.example-chip');
        if (!btn) return;
        const chip = EXAMPLE_CHIPS[+btn.dataset.idx];
        mainInput.value = chip.template;
        mainInput.focus();
        autoGrow(mainInput);
        const phoneStart = chip.template.indexOf('+1-XXX');
        const phoneEnd   = chip.template.indexOf(' and');
        if (phoneStart !== -1 && phoneEnd !== -1) mainInput.setSelectionRange(phoneStart, phoneEnd);
        else mainInput.setSelectionRange(0, chip.template.length);
      });
    }

    // ── DOM refs ────────────────────────────────────────────────────────────────
    const mainInput   = document.getElementById('main-input');
    const submitBtn   = document.getElementById('submit-btn');
    const submitError = document.getElementById('submit-error');
    const taskList    = document.getElementById('task-list');
    const healthDot   = document.getElementById('health-dot');
    const healthLabel = document.getElementById('health-label');
    const callsCount  = document.getElementById('calls-count');

    // ── Textarea auto-grow ──────────────────────────────────────────────────────
    function autoGrow(el) {
      if (!CSS.supports('field-sizing', 'content')) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      }
    }

    mainInput.addEventListener('input', () => autoGrow(mainInput));
    mainInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
    });
    submitBtn.addEventListener('click', () => handleSubmit());

    // ── Submit ──────────────────────────────────────────────────────────────────
    async function handleSubmit() {
      const text = mainInput.value.trim();
      if (!text) return;

      submitError.textContent = '';
      const origHTML = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Sending…';
      submitBtn.disabled = true;

      try {
        const body = { request: text };
        if (selectedAgent !== 'auto') body.agent_type = selectedAgent;

        const res  = await fetch('/tasks', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          submitError.textContent = data?.error || data?.message || `Error ${res.status}`;
          return;
        }

        mainInput.value = '';
        if (!CSS.supports('field-sizing', 'content')) mainInput.style.height = 'auto';

        state.tasks = [data, ...state.tasks.filter(t => t.id !== data.id)];
        state.expanded.add(data.id);
        renderTasks(true);
        await refreshTasks();

      } catch {
        submitError.textContent = 'Could not connect to server.';
      } finally {
        submitBtn.innerHTML = origHTML;
        submitBtn.disabled = false;
      }
    }

    // ── Health ──────────────────────────────────────────────────────────────────
    async function checkHealth() {
      try {
        const res  = await fetch('/api/health');
        const data = await res.json();
        healthDot.classList.remove('err');
        const n = data.activeCalls ?? 0;
        healthLabel.textContent = `${n} active`;
        if (n > 0) healthDot.classList.add('calling');
        else healthDot.classList.remove('calling');
      } catch {
        healthDot.classList.add('err');
        healthDot.classList.remove('calling');
        healthLabel.textContent = 'offline';
      }
    }

    // ── Refresh loop ────────────────────────────────────────────────────────────
    async function refreshTasks() {
      try {
        const res = await fetch('/tasks');
        if (!res.ok) return;
        state.tasks = await res.json();

        const needDetails = state.tasks.filter(t =>
          t.status === 'calling' || state.expanded.has(t.id)
        );
        await Promise.all(needDetails.map(async t => {
          try {
            const r = await fetch(`/tasks/${t.id}`);
            if (!r.ok) return;
            const d = await r.json();
            state.details[t.id] = {
              transcripts: d.transcripts || [],
              result:      d.result || t.result || null,
            };
          } catch { /* silent */ }
        }));

        renderTasks(false);
      } catch { /* silent */ }
    }

    // ── Render ──────────────────────────────────────────────────────────────────
    function renderTasks(animateFirst) {
      const tasks = state.tasks;
      const hero         = document.getElementById('hero');
      const tasksSection = document.getElementById('tasks-section');
      const chipsSection = document.getElementById('chips-section');

      if (tasks.length > 0) {
        tasksSection.style.display = '';
        chipsSection.style.display = 'none';
        hero.classList.add('compact');
      } else {
        tasksSection.style.display = 'none';
        chipsSection.style.display = '';
        hero.classList.remove('compact');
      }

      callsCount.textContent = tasks.length ? `${tasks.length} total` : '';

      if (tasks.length === 0) { taskList.innerHTML = ''; updateSidebar(); return; }

      const existing = {};
      taskList.querySelectorAll('.task-card[data-id]').forEach(el => {
        existing[el.dataset.id] = el;
      });

      const ids = tasks.map(t => String(t.id));
      Object.keys(existing).forEach(id => { if (!ids.includes(id)) existing[id].remove(); });

      tasks.forEach((task, idx) => {
        const id = String(task.id);
        if (existing[id]) {
          updateCard(existing[id], task);
        } else {
          const el = createCard(task);
          if (animateFirst && idx === 0) {
            el.style.opacity = '0';
            requestAnimationFrame(() => { el.style.transition = 'opacity 0.22s'; el.style.opacity = '1'; });
          }
          const ref = taskList.children[idx];
          if (ref) taskList.insertBefore(el, ref);
          else taskList.appendChild(el);
        }
      });

      updateSidebar();
    }

    function createCard(task) {
      const el = document.createElement('div');
      el.className  = `task-card s-${task.status}`;
      el.dataset.id = String(task.id);
      el.innerHTML  = cardHTML(task);
      attachCardEvents(el, task);
      return el;
    }

    function updateCard(el, task) {
      const id = String(task.id);

      if (task.status === 'calling' && !state.expanded.has(id)) {
        state.expanded.add(id);
        const wrap = el.querySelector('.transcript-wrap');
        if (wrap) wrap.classList.add('open');
        if (!state.details[id]) {
          fetch(`/tasks/${id}`)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
              if (!data) return;
              state.details[id] = { transcripts: data.transcripts || [], result: data.result || null };
              const msgs = el.querySelector('.chat-messages');
              if (msgs) { renderChatBubbles(msgs, task, id); msgs.scrollTop = msgs.scrollHeight; }
            }).catch(() => {});
        }
      }

      if (task.status === 'calling' && !state.callStart[id]) state.callStart[id] = Date.now();

      el.className = `task-card s-${task.status}`;

      // Status pill colours
      const dot = el.querySelector('.status-dot');
      const lbl = el.querySelector('.status-label');
      if (dot) {
        dot.className = `status-dot dot-${task.status}`;
      }
      if (lbl) {
        lbl.className = `status-label lbl-${task.status}`;
        lbl.textContent = task.status;
      }

      const reqEl = el.querySelector('.task-request');
      if (reqEl) reqEl.textContent = task.description || task.request || '';

      const subEl = el.querySelector('.task-sub');
      if (subEl) {
        const phone = extractPhone(task);
        subEl.textContent = phone || task.business_name || '';
      }

      const timeEl = el.querySelector('.task-time');
      if (timeEl) timeEl.textContent = formatTime(task);

      const cancelBtn = el.querySelector('.task-cancel');
      if (cancelBtn) cancelBtn.style.display = task.status === 'pending' ? '' : 'none';

      const progressFill = el.querySelector('.task-progress-fill');
      if (progressFill && task.status === 'calling' && state.callStart[id]) {
        const pct = Math.min((Date.now() - state.callStart[id]) / 180000, 0.94) * 100;
        progressFill.style.width = pct + '%';
      }

      const mcWrap = el.querySelector('.mark-complete-wrap');
      if (mcWrap) mcWrap.style.display = task.status === 'calling' ? '' : 'none';

      const tBody = el.querySelector('.transcript-body');
      if (tBody) {
        const msgs = tBody.querySelector('.chat-messages');
        if (msgs) renderChatBubbles(msgs, task, id);

        const det    = state.details[id];
        const result = det?.result || task.result || null;
        let resFooter = tBody.querySelector('.transcript-result');
        if (result && task.status !== 'calling') {
          if (!resFooter) {
            resFooter = document.createElement('div');
            resFooter.className = 'transcript-result' + (task.status === 'failed' ? ' failed' : '');
            tBody.appendChild(resFooter);
          }
          resFooter.textContent = (task.status === 'completed' ? '✓ ' : '✗ ') + result;
        } else if (resFooter) {
          resFooter.remove();
        }
      }

      const wrap = el.querySelector('.transcript-wrap');
      if (wrap) wrap.classList.toggle('open', state.expanded.has(id));

      if (task.status === 'calling' && state.expanded.has(id)) {
        const msgs = el.querySelector('.chat-messages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
      }
    }

    const AGENT_LABELS = {
      food_ordering:             'Food',
      appointment_booking:       'Appt',
      general_customer_service:  'Support',
      insurance_calls:           'Insurance',
    };

    function agentChipHTML(task) {
      const type = task.agent_type;
      if (!type || type === 'generic') return '';
      const label = AGENT_LABELS[type] || type.replace(/_/g, ' ');
      return `<span class="agent-chip ${escHtml(type)}">${escHtml(label)}</span>`;
    }

    function cardHTML(task) {
      const id    = String(task.id);
      const req   = escHtml(task.description || task.request || '');
      const phone = extractPhone(task);
      const sub   = escHtml(phone || task.business_name || '');

      return `
        <div class="task-card-header">
          <div class="task-status-pill">
            <div class="status-dot dot-${task.status}"></div>
            <span class="status-label lbl-${task.status}">${task.status}</span>
          </div>
          <div class="task-info-text">
            <div class="task-request">${req}</div>
            ${sub ? `<div class="task-sub">${sub}</div>` : ''}
          </div>
          ${agentChipHTML(task)}
          <span class="task-time">${escHtml(formatTime(task))}</span>
          <button class="task-cancel" title="Cancel" data-action="cancel" style="${task.status !== 'pending' ? 'display:none' : ''}">×</button>
        </div>
        <div class="task-progress">
          <div class="task-progress-fill" style="width:0%"></div>
        </div>
        <div class="transcript-wrap${state.expanded.has(id) ? ' open' : ''}">
          <div class="transcript-inner">
            <div class="transcript-body">
              <div class="chat-messages"></div>
              <div class="mark-complete-wrap" style="${task.status !== 'calling' ? 'display:none' : ''}">
                <button class="mark-complete-btn" data-action="mark-complete">Mark Complete</button>
                <div class="mark-complete-input-wrap">
                  <input class="mark-complete-input" placeholder="What was the result?">
                  <button class="mark-complete-confirm" data-action="confirm-complete">Confirm</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderChatBubbles(container, task, resolvedId) {
      const id          = resolvedId || String(task.id);
      const transcripts = state.details[id]?.transcripts || [];
      const currentTask = state.tasks.find(t => String(t.id) === id) || task;
      const calling     = currentTask.status === 'calling';

      if (transcripts.length === 0) {
        container.innerHTML = `<div class="transcript-empty-msg">${
          calling ? 'Waiting for conversation to begin…' : 'No transcript available.'
        }</div>`;
        return;
      }

      container.innerHTML = transcripts.map((t, i) => {
        const role       = (t.role || '').toLowerCase();
        const isAgent    = role === 'agent' || role === 'assistant';
        const isLast     = i === transcripts.length - 1;
        const showCursor = isLast && isAgent && calling;
        return `<div class="chat-message ${isAgent ? 'agent' : 'user'}">
          <div class="chat-avatar">${isAgent ? 'AI' : 'ME'}</div>
          <div class="chat-bubble">${escHtml(t.content || '')}${showCursor ? '<span class="transcript-cursor">▌</span>' : ''}</div>
        </div>`;
      }).join('');
    }

    function attachCardEvents(el, task) {
      const id = String(task.id);

      el.addEventListener('click', e => {
        if (e.target.closest('[data-action]')) return;
        toggleExpand(id, el, task);
      });

      el.addEventListener('click', e => {
        if (!e.target.closest('[data-action="cancel"]')) return;
        e.stopPropagation();
        cancelTask(id);
      });

      el.addEventListener('click', e => {
        const btn = e.target.closest('[data-action="mark-complete"]');
        if (!btn) return;
        e.stopPropagation();
        const mcWrap = btn.closest('.mark-complete-wrap');
        btn.style.display = 'none';
        const inputWrap = mcWrap.querySelector('.mark-complete-input-wrap');
        inputWrap.style.display = 'flex';
        inputWrap.querySelector('.mark-complete-input').focus();
      });

      el.addEventListener('click', async e => {
        const btn = e.target.closest('[data-action="confirm-complete"]');
        if (!btn) return;
        e.stopPropagation();
        const inputWrap = btn.closest('.mark-complete-input-wrap');
        const result = inputWrap.querySelector('.mark-complete-input').value.trim() || 'Task completed manually';
        btn.textContent = '…';
        btn.disabled = true;
        try {
          const res = await fetch(`/tasks/${id}`, {
            method:  'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ status: 'completed', result }),
          });
          if (!res.ok) throw new Error(`Server error ${res.status}`);
          await refreshTasks();
        } catch { /* silent */ } finally {
          btn.textContent = 'Confirm';
          btn.disabled = false;
        }
      });
    }

    function toggleExpand(id, el, task) {
      if (state.expanded.has(id)) {
        state.expanded.delete(id);
      } else {
        state.expanded.add(id);
        if (!state.details[id]) {
          fetch(`/tasks/${id}`)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
              if (!data) return;
              state.details[id] = { transcripts: data.transcripts || [], result: data.result || task.result || null };
              const msgs = el.querySelector('.chat-messages');
              if (msgs) { renderChatBubbles(msgs, task, id); msgs.scrollTop = msgs.scrollHeight; }
            }).catch(() => {});
        } else {
          const msgs = el.querySelector('.chat-messages');
          if (msgs) { renderChatBubbles(msgs, task, id); msgs.scrollTop = msgs.scrollHeight; }
        }
      }
      const wrap = el.querySelector('.transcript-wrap');
      if (wrap) wrap.classList.toggle('open', state.expanded.has(id));
    }

    async function cancelTask(id) {
      try {
        await fetch(`/tasks/${id}`, { method: 'DELETE' });
        await refreshTasks();
      } catch { /* silent */ }
    }

    // ── Sidebar ─────────────────────────────────────────────────────────────────
    function updateSidebar() {
      const list  = document.getElementById('sidebar-list');
      const tasks = state.tasks;

      if (!tasks.length) {
        list.innerHTML = '<div class="sidebar-empty">No calls yet</div>';
        return;
      }

      list.innerHTML = tasks.map(task => {
        const id     = String(task.id);
        const det    = state.details[id];
        const result = det?.result || task.result || null;
        const query  = task.description || task.request || '';
        const active = state.expanded.has(id);

        return `<div class="sidebar-item${active ? ' active' : ''}" data-id="${id}">
          <div class="sidebar-dot dot-${task.status}"></div>
          <div class="sidebar-content">
            <div class="sidebar-query">${escHtml(truncate(query, 80))}</div>
            <div class="sidebar-meta">
              <span class="sidebar-status lbl-${task.status}">${task.status}</span>
              <span class="sidebar-time">${escHtml(formatTime(task))}</span>
            </div>
            ${result ? `<div class="sidebar-summary">${escHtml(truncate(result, 60))}</div>` : ''}
          </div>
        </div>`;
      }).join('');

      list.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
          const id     = item.dataset.id;
          const cardEl = taskList.querySelector(`.task-card[data-id="${id}"]`);
          if (!cardEl) return;
          cardEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          if (!state.expanded.has(id)) {
            const t = state.tasks.find(x => String(x.id) === id);
            if (t) toggleExpand(id, cardEl, t);
          }
        });
      });
    }

    // ── Helpers ─────────────────────────────────────────────────────────────────
    function extractPhone(task) {
      if (task.phone_number) return task.phone_number;
      if (task.request) {
        const m = task.request.match(/(\+?[\d\s\-().]{7,})/);
        if (m) return m[1].trim();
      }
      return null;
    }

    function formatTime(task) {
      if (task.status === 'pending' && task.scheduled_at) {
        const msUntil = new Date(task.scheduled_at).getTime() - Date.now();
        if (msUntil > 0) return `in ${Math.ceil(msUntil / 60000)}m`;
      }
      const ts = task.created_at || task.updated_at;
      if (!ts) return '';
      const secs = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
      if (secs < 60)  return 'just now';
      const mins = Math.floor(secs / 60);
      if (mins < 60)  return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24)   return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function truncate(str, n) {
      if (!str) return '';
      return str.length > n ? str.slice(0, n) + '…' : str;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Boot ────────────────────────────────────────────────────────────────────
    (async function init() {
      renderChips();
      await Promise.all([checkHealth(), refreshTasks()]);
      setInterval(refreshTasks, 2000);
      setInterval(checkHealth, 10000);
    })();
  </script>
</body>
</html>
